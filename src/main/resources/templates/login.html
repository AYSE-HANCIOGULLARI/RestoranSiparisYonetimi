<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastroGusto - Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-cover bg-center bg-no-repeat min-h-screen flex items-center justify-center p-4 relative"
      style="background-image: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1920');">

<div class="absolute inset-0 bg-slate-950/60 backdrop-blur-md"></div>

<div class="relative w-full max-w-md bg-slate-900/40 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-white/10 transition-all duration-300 hover:shadow-orange-500/10">

    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-orange-500 to-amber-500 text-white rounded-2xl text-3xl mb-3 shadow-xl shadow-orange-500/30 transform rotate-12 hover:rotate-0 transition-all duration-300">
            🍳
        </div>
        <h1 class="text-3xl font-extrabold text-white tracking-tight">GastroGusto</h1>
        <p class="text-xs text-slate-300/80 uppercase tracking-widest mt-1 font-medium">Restoran Sipariş Yönetimi </p>
    </div>

    <div th:if="${param.error}" class="mb-5 p-3.5 bg-rose-500/10 border-l-4 border-rose-500 text-rose-200 text-sm rounded-r-xl flex items-center gap-2 animate-pulse">
        <span class="font-bold">Hata:</span> Kullanıcı adı veya şifre hatalı!
    </div>

    <form th:action="@{/login}" method="post" class="space-y-5">

        <div>
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Kullanıcı Adı</label>
            <input type="text"
                   name="username"
                   required
                   placeholder="Kullanıcı adınızı girin"
                   class="w-full px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition-all text-white bg-white/5 placeholder-slate-500 text-sm" />
        </div>

        <div>
            <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Şifre</label>
            <input type="password"
                   id="passwordField"
                   name="password"
                   required
                   placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition-all text-white bg-white/5 placeholder-slate-500 text-sm" />
        </div>

        <div class="flex items-center px-1">
            <input type="checkbox"
                   id="showPasswordToggle"
                   class="w-4 h-4 rounded text-orange-500 border-white/10 bg-white/5 focus:ring-orange-400 focus:ring-offset-slate-900 focus:ring-2 transition-all cursor-pointer"
                   onclick="togglePasswordVisibility()" />
            <label th:for="showPasswordToggle" class="ml-2.5 text-xs font-medium text-slate-300 select-none cursor-pointer hover:text-white transition-all">
                Şifreyi Göster
            </label>
        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-orange-500/20 transform active:scale-[0.98] transition-all tracking-wide text-sm mt-4">
            Sisteme Giriş Yap
        </button>

    </form>

    <div class="mt-8 text-center text-[10px] text-slate-500">
        &copy; 2026 GastroGusto. Tüm Hakları Saklıdır.
    </div>

</div>

<script>
    function togglePasswordVisibility() {
        const passwordField = document.getElementById('passwordField');
        const checkbox = document.getElementById('showPasswordToggle');

        if (checkbox.checked) {
            passwordField.type = 'text';
        } else {
            passwordField.type = 'password';
        }
    }
</script>

</body>
</html>
